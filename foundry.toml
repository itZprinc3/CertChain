[profile.default]
src = "src"
out = "out"
lib = "lib"
solc = "0.8.19"
optimizer = true
optimizer_runs = 200
remappings = ["@forge-std/=lib/forge-std/src/"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
anvil = "http://127.0.0.1:8545"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
